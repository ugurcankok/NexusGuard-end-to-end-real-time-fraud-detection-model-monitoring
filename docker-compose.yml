services:
  db:
    image: postgres:15
    container_name: mlflow_db
    environment:
      - POSTGRES_USER=mlflow_user
      - POSTGRES_PASSWORD=mlflow_password
      - POSTGRES_DB=mlflow_db
    ports:
      - "5433:5432"
    networks:
      - nexus_network

  mlflow:
    build:
      context: .
      dockerfile: mlflow.Dockerfile
    container_name: mlflow_server
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    depends_on:
      - db
    environment:
      - BACKEND_STORE_URI=postgresql://mlflow_user:mlflow_password@db:5432/mlflow_db
      - MLFLOW_HTTP_PERMITTED_HOSTS=0.0.0.0,mlflow_server,localhost,127.0.0.1,serving,nexus_serving,host.docker.internal
    command: >
      mlflow server 
      --backend-store-uri postgresql://mlflow_user:mlflow_password@db:5432/mlflow_db
      --artifacts-destination file:///mlflow/mlruns
      --host 0.0.0.0
      --port 5000
      --allowed-hosts mlflow_server,mlflow_server:5000,localhost,127.0.0.1,nexus_serving,serving,localhost:5001
    networks:
      - nexus_network

  cassandra:
    image: cassandra:4.1
    container_name: nexus_cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=NexusGuardCluster
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces'"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - nexus_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - nexus_network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: nexus_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - nexus_network
  
  trainer:
    build:
      context: .
      dockerfile: src/training/training.Dockerfile
    container_name: nexus_trainer
    depends_on:
      - mlflow
      - db
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow_server:5000
    networks:
      - nexus_network
  
  serving:
    build:
      context: .
      dockerfile: src/serving/serving.Dockerfile
    container_name: nexus_serving
    ports:
      - "8000:8000"
    depends_on:
      mlflow:
        condition: service_started
      cassandra:
        condition: service_healthy
      trainer:
        condition: service_completed_successfully
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow_server:5000
      - CASSANDRA_HOST=nexus_cassandra
      - MLFLOW_HTTP_PERMITTED_HOSTS=mlflow_server,localhost,127.0.0.1
    networks:
      - nexus_network
  
  producer:
    build:
      context: .
      dockerfile: src/streaming/streaming.Dockerfile
    container_name: nexus_producer
    command: python src/streaming/producer.py
    depends_on:
      - kafka
    restart: on-failure
    networks:
      - nexus_network

  consumer:
    build:
      context: .
      dockerfile: src/streaming/streaming.Dockerfile
    container_name: nexus_consumer
    command: python src/streaming/consumer.py
    depends_on:
      - kafka
      - serving
    restart: on-failure
    networks:
      - nexus_network
  
  prometheus:
    image: prom/prometheus:latest
    container_name: nexus_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - nexus_network
    depends_on:
      - serving

  grafana:
    image: grafana/grafana:latest
    container_name: nexus_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - nexus_network
    depends_on:
      - prometheus
  
  jenkins:
    build:
      context: .
      dockerfile: jenkins.Dockerfile
    container_name: nexus_jenkins
    privileged: true
    user: root
    ports:
      - "8080:8080"
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
    networks:
      - nexus_network

networks:
  nexus_network:
    driver: bridge